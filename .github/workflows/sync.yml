name: Sync Notion → README

on:
  schedule:
    - cron: "0 6 * * *"   # runs every day at 6am UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run sync script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/sync.py

      - name: Commit and push changes
        run: |
          git config user.name "LiSiruiRay"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add README.md images/
          git diff --cached --quiet || git commit -m "sync: update from Notion $(date -u +%Y-%m-%d)"
          git push
